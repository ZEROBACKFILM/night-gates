<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0a07">
<title>성문이 닫힌 밤</title>
  <meta name="theme-color" content="#120d07">
  <meta name="description" content="역병의 해, 봉쇄된 도시의 서른 밤을 다스리는 선택의 카드게임">
  <meta property="og:title" content="성문이 닫힌 밤">
  <meta property="og:description" content="왕은 성문을 닫으라 명했고, 영주는 도망쳤다. 이제 이 도시는 그대의 몫이다.">
  <meta property="og:type" content="website">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Gowun+Batang:wght@400;700&family=EB+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0d0a07;
  --vellum:#e8d8ad;
  --vellum-dk:#c2ac7c;
  --ink:#1b1308;
  --ink-soft:#4a3a22;
  --candle:#e09a3e;
  --candle-hi:#f4c473;
  --blood:#a03a2b;
  --glow:224,154,62;
  --c-f:#d9a84e; --c-m:#c9564a; --c-h:#8aa06e; --c-t:#8d9cab;
}
#app[data-act="2"]{--glow:186,164,74}
#app[data-act="3"]{--glow:206,110,58}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#050403;overflow:hidden}
body{font-family:'Gowun Batang',serif;color:var(--vellum);display:flex;align-items:center;justify-content:center;
  touch-action:manipulation}
button{touch-action:manipulation}

#app{position:relative;width:100%;max-width:430px;height:100%;max-height:960px;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  background:
  radial-gradient(120% 90% at 50% -10%, #2a2014 0%, transparent 55%),
  radial-gradient(140% 100% at 50% 115%, rgba(var(--glow),.15) 0%, transparent 50%),
  var(--night);
  overflow:hidden;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;
  transition:background 1.2s}

/* ── ambience ── */
#candleGlow{position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(90% 55% at 50% 100%, rgba(var(--glow),.18) 0%, transparent 60%);
  animation:flicker 4.2s ease-in-out infinite;transition:background 1s}
@keyframes flicker{0%,100%{opacity:.85}18%{opacity:1}34%{opacity:.78}52%{opacity:.95}71%{opacity:.8}86%{opacity:.98}}
.fog{position:absolute;left:-20%;width:140%;height:30%;bottom:-6%;pointer-events:none;z-index:2;opacity:.7;
  background:radial-gradient(50% 60% at 30% 60%, rgba(120,110,90,.09), transparent 70%),
             radial-gradient(45% 55% at 72% 45%, rgba(120,110,90,.07), transparent 70%);
  filter:blur(6px);animation:drift 28s linear infinite alternate;transition:opacity 1.2s}
#app[data-act="2"] .fog{opacity:1}
#app[data-act="3"] .fog{opacity:1.35}
@keyframes drift{from{transform:translateX(-4%)}to{transform:translateX(4%)}}
#vig{position:absolute;inset:0;pointer-events:none;z-index:8;box-shadow:inset 0 0 110px 30px rgba(0,0,0,.7)}

/* ── header ── */
header{position:relative;z-index:5;padding:14px 20px 0}
.hRow{display:flex;justify-content:space-between;align-items:baseline}
#gameTitle{font-family:'Song Myung',serif;font-size:12px;letter-spacing:.32em;color:var(--vellum-dk)}
#actChip{font-family:'Song Myung',serif;font-size:12px;letter-spacing:.18em;color:rgb(var(--glow));
  text-shadow:0 0 10px rgba(var(--glow),.5)}
#dayLine{font-family:'Song Myung',serif;font-size:23px;letter-spacing:.12em;color:var(--vellum);
  text-align:center;margin-top:6px;text-shadow:0 0 16px rgba(var(--glow),.4)}
#prog{position:relative;height:3px;margin:10px 2px 0;background:rgba(230,214,171,.14);border-radius:2px;overflow:visible}
#progFill{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:2px;
  background:linear-gradient(90deg, rgba(var(--glow),.55), rgb(var(--glow)));
  box-shadow:0 0 8px rgba(var(--glow),.6);transition:width .6s ease}
.notch{position:absolute;top:-2.5px;width:1.5px;height:8px;background:rgba(230,214,171,.4)}

/* ── stats ── */
#stats{position:relative;z-index:5;display:flex;justify-content:center;gap:18px;padding:12px 0 4px}
.seal{position:relative;width:62px;text-align:center}
.seal .orb{position:relative;width:52px;height:52px;margin:0 auto;border-radius:50%;overflow:hidden;
  background:#120d08;border:1.5px solid rgba(230,214,171,.35);
  box-shadow:0 3px 10px rgba(0,0,0,.6), inset 0 2px 6px rgba(0,0,0,.8);transition:border-color .3s}
.seal .liq{position:absolute;left:0;right:0;bottom:0;height:50%;transition:height .5s cubic-bezier(.2,.8,.3,1)}
.seal.f .liq{background:linear-gradient(180deg,#d9a84e,#8a6a30)}
.seal.m .liq{background:linear-gradient(180deg,#c9564a,#6d241c)}
.seal.h .liq{background:linear-gradient(180deg,#8aa06e,#4a5a3c)}
.seal.t .liq{background:linear-gradient(180deg,#8d9cab,#46525e)}
.seal svg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:26px;height:26px;z-index:2;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.95))}
.seal .lbl{font-size:12px;letter-spacing:.1em;color:var(--vellum-dk);margin-top:6px}
.seal .lbl b{font-family:'Song Myung',serif;color:var(--vellum);margin-left:4px;font-weight:400}
.seal.warn .orb{border-color:var(--blood);animation:warnB 1.6s ease-in-out infinite}
@keyframes warnB{50%{box-shadow:0 0 14px rgba(160,58,43,.8), inset 0 2px 6px rgba(0,0,0,.8)}}
.seal.pulse .orb{animation:pulse .45s ease}
@keyframes pulse{40%{box-shadow:0 0 20px rgba(var(--glow),.9), inset 0 2px 6px rgba(0,0,0,.8)}}
.delta{position:absolute;left:50%;top:-8px;transform:translateX(-50%);font-family:'Song Myung',serif;font-size:16px;
  pointer-events:none;z-index:9;white-space:nowrap;text-shadow:0 1px 5px rgba(0,0,0,.95);
  animation:dfloat .95s ease forwards}
.delta.up{color:#a8d98f}.delta.down{color:#e57a63}
.delta.press{color:#9a8fae;font-size:13px;animation-duration:1.15s}
@keyframes dfloat{0%{opacity:0;transform:translate(-50%,6px)}18%{opacity:1;transform:translate(-50%,0)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-18px)}}

/* ── card ── */
#stage{position:relative;z-index:6;flex:1;display:flex;align-items:stretch;justify-content:center;perspective:1200px;
  padding:10px 18px 4px;min-height:0}
.card{position:relative;width:100%;display:flex;flex-direction:column;
  border-radius:10px 14px 12px 15px / 14px 10px 15px 11px;
  background:
    radial-gradient(120% 80% at 30% 10%, rgba(255,246,220,.6), transparent 55%),
    radial-gradient(90% 60% at 80% 100%, rgba(90,66,30,.4), transparent 60%),
    radial-gradient(26% 16% at 84% 20%, rgba(122,88,40,.18), transparent 70%),
    repeating-linear-gradient(93deg, rgba(80,60,28,.05) 0 2px, transparent 2px 5px),
    linear-gradient(160deg, #eee0b6 0%, var(--vellum) 45%, #cbb586 100%);
  box-shadow:0 22px 44px -12px rgba(0,0,0,.85), 0 6px 14px rgba(0,0,0,.5),
    inset 0 0 0 1px rgba(255,240,200,.4), inset 0 0 30px rgba(84,60,25,.3);
  transform-style:preserve-3d;will-change:transform;overflow:hidden}
.card::after{content:"";position:absolute;inset:7px;border:1px solid rgba(74,58,34,.35);
  border-radius:6px 10px 8px 11px;pointer-events:none}
.corner{position:absolute;width:26px;height:26px;pointer-events:none;opacity:.55;z-index:2}
.corner svg{width:100%;height:100%;display:block}
.corner.tl{top:9px;left:9px}
.corner.tr{top:9px;right:9px;transform:scaleX(-1)}
.corner.bl{bottom:9px;left:9px;transform:scaleY(-1)}
.corner.br{bottom:9px;right:9px;transform:scale(-1)}
.card.deal{animation:deal .5s cubic-bezier(.2,.9,.25,1.1)}
@keyframes deal{from{transform:translateY(40px) scale(.94) rotateX(10deg);opacity:0}to{transform:none;opacity:1}}
.card.out{transition:transform .4s cubic-bezier(.5,0,.8,.4), opacity .4s;
  transform:translateY(-40px) scale(.94) rotateX(-8deg);opacity:0}

.portrait{position:relative;margin:15px 15px 0;flex:1;min-height:120px;border-radius:7px 10px 8px 11px;overflow:hidden;
  background:radial-gradient(110% 90% at 50% 0%, #241a10 0%, #0f0b07 70%);
  box-shadow:inset 0 0 0 1px rgba(60,44,20,.7), inset 0 -18px 30px rgba(0,0,0,.7)}
.portrait svg{position:absolute;inset:0;width:100%;height:100%}
.figLy,.artImg{animation:breathe 5.5s ease-in-out infinite;transform-origin:50% 100%}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.012) translateY(-1px)}}
.artImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 22%;will-change:transform}
.artFog{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg, rgba(15,11,7,.38) 0%, transparent 26%, transparent 68%, rgba(15,11,7,.6) 100%),
  radial-gradient(120% 100% at 50% 45%, transparent 55%, rgba(10,7,4,.5) 100%)}
.ly{will-change:transform;transition:transform .4s ease}
.pGlow{position:absolute;inset:0;background:radial-gradient(80% 60% at 50% 92%, rgba(var(--glow),.25), transparent 65%);
  mix-blend-mode:screen;pointer-events:none;transition:background 1s}
.mote{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(var(--glow),.75);
  filter:blur(.5px);pointer-events:none;animation:mote 7s ease-in-out infinite}
.mote.m2{width:2px;height:2px;animation-duration:9s;animation-delay:2.2s}
.mote.m3{width:2px;height:2px;animation-duration:11s;animation-delay:4.6s}
@keyframes mote{0%{opacity:0;transform:translateY(12px)}20%{opacity:.9}80%{opacity:.4}100%{opacity:0;transform:translateY(-46px) translateX(8px)}}

.roleTag{font-size:11px;letter-spacing:.4em;text-indent:.4em;text-align:center;color:var(--ink-soft);
  margin-top:12px;opacity:.85}
.charName{font-family:'Song Myung',serif;text-align:center;font-size:17px;letter-spacing:.22em;text-indent:.22em;
  color:var(--ink);margin-top:3px}
.nameOrn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:5px;opacity:.5}
.nameOrn::before,.nameOrn::after{content:"";width:44px;height:1px;background:linear-gradient(90deg,transparent,#4a3a22)}
.nameOrn::after{transform:scaleX(-1)}
.nameOrn i{width:5px;height:5px;background:#4a3a22;transform:rotate(45deg)}
.cardText{font-size:16.5px;font-weight:700;line-height:1.72;color:var(--ink);text-align:center;
  padding:9px 22px 17px;word-break:keep-all}

/* ── choices ── */
#choices{position:relative;z-index:6;display:flex;flex-direction:column;gap:9px;padding:12px 18px 18px}
.opt{position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
  font-family:'Gowun Batang',serif;font-size:15.5px;font-weight:700;line-height:1.45;color:#efe3c4;
  background:linear-gradient(160deg, #2b2113 0%, #1c1509 60%, #171008 100%);
  border:1px solid rgba(var(--glow),.38);border-radius:6px;padding:13px 14px;word-break:keep-all;overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.55), inset 0 1px 0 rgba(244,196,115,.12);
  transition:transform .12s, border-color .2s, box-shadow .2s;opacity:0;animation:optIn .35s forwards}
.opt::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg, rgba(var(--glow),.7), rgba(var(--glow),.15))}
.opt:nth-child(2){animation-delay:.05s}.opt:nth-child(3){animation-delay:.1s}.opt:nth-child(4){animation-delay:.15s}
@keyframes optIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.opt:hover,.opt:focus-visible{border-color:rgb(var(--glow));outline:none;
  box-shadow:0 4px 16px rgba(0,0,0,.6), 0 0 14px rgba(var(--glow),.28), inset 0 1px 0 rgba(244,196,115,.2)}
.opt:active{transform:scale(.985)}
.opt .num{flex:none;font-family:'Song Myung',serif;font-size:14px;width:27px;height:27px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--candle-hi);
  border:1px solid rgba(var(--glow),.55);background:rgba(var(--glow),.08)}
.opt .txt{flex:1}
.opt.chosen{border-color:var(--candle-hi);background:linear-gradient(160deg,#4a3618,#2b2113);
  box-shadow:0 0 22px rgba(var(--glow),.45)}
.opt:disabled{cursor:default}


/* ── gamble result (맥락 문장 연출) ── */
#gRes{position:absolute;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;
  padding:44px;pointer-events:none;opacity:0;transition:opacity .4s;cursor:pointer;
  background:radial-gradient(70% 50% at 50% 50%, rgba(5,4,3,.93), rgba(5,4,3,.62) 70%, transparent)}
#gRes.show{opacity:1;pointer-events:auto}
#gRes p{font-family:'Gowun Batang',serif;font-size:17.5px;font-weight:700;line-height:1.9;text-align:center;
  max-width:300px;word-break:keep-all;color:#ecdcb2;text-shadow:0 0 20px rgba(224,154,62,.4), 0 2px 8px rgba(0,0,0,.9)}
#gRes .tapHint{position:absolute;bottom:20%;left:0;right:0;text-align:center;
  font-family:'Gowun Batang',serif;font-size:12px;letter-spacing:.24em;text-indent:.24em;
  color:rgba(230,214,171,.55);animation:hintPulse 2s ease-in-out infinite}
#app[data-lang="en"] #gRes .tapHint{font-family:'EB Garamond',serif;letter-spacing:.14em}

/* ── ending: 장면을 전체 배경으로 ── */
#ending{overflow:hidden}
.endBg{position:absolute;inset:0;z-index:0}
.endBg svg{width:100%;height:100%;display:block}
.endScrim{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(180deg, rgba(5,4,3,.5) 0%, rgba(5,4,3,.15) 30%, rgba(5,4,3,.62) 58%, rgba(5,4,3,.92) 100%)}
#ending>*:not(.endBg):not(.endScrim){position:relative;z-index:2}
#ending h1{text-shadow:0 2px 20px rgba(0,0,0,.9), 0 0 26px rgba(var(--glow),.45)}
#ending .body{text-shadow:0 1px 10px rgba(0,0,0,.95);color:#e2d0a4}
#endCause{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:0 24px;
  font-family:'Song Myung',serif;font-size:13px;letter-spacing:.08em;color:var(--vellum-dk);
  line-height:1.7;word-break:keep-all;text-align:center;text-shadow:0 1px 8px rgba(0,0,0,.9)}
#app[data-lang="en"] #endCause{font-family:'EB Garamond',serif;letter-spacing:.06em}
#endCause i{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 8px rgba(0,0,0,.6)}
#endCause.f i{background:var(--c-f)}#endCause.m i{background:var(--c-m)}
#endCause.h i{background:var(--c-h)}#endCause.t i{background:var(--c-t)}
#endCause.hide{display:none}

/* ── collection ── */
.colBtn{margin-top:18px;background:none;border:none;color:var(--vellum-dk);font-family:'Gowun Batang',serif;
  font-size:13.5px;letter-spacing:.08em;cursor:pointer;text-decoration:underline;text-underline-offset:4px}
.colBtn:hover{color:var(--vellum)}
#colOv{justify-content:flex-start;overflow-y:auto;padding-top:56px;padding-bottom:40px}
#colGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:20px;max-width:340px;width:100%}
.colCell{border:1px solid rgba(230,214,171,.25);border-radius:6px;padding:8px;background:rgba(255,255,255,.02)}
.colCell .thumb{aspect-ratio:16/9;border-radius:4px;overflow:hidden;background:#0c0906;
  display:flex;align-items:center;justify-content:center}
.colCell .thumb svg{width:100%;height:100%}
.colCell .cName{font-family:'Song Myung',serif;font-size:12.5px;letter-spacing:.08em;color:var(--vellum);
  margin-top:7px;text-align:center}
.colCell.locked .thumb{color:#4a3f2c;font-family:'Song Myung',serif;font-size:22px}
.colCell.locked .cName{color:#5a4f38}


/* ── difficulty selector ── */
#diffSeg{display:flex;gap:8px;margin-top:26px}
#diffSeg button{font-family:'Song Myung',serif;font-size:14px;letter-spacing:.14em;text-indent:.14em;
  padding:10px 18px;background:transparent;border:1px solid rgba(230,214,171,.3);border-radius:3px;
  color:var(--vellum-dk);cursor:pointer;transition:all .25s}
#diffSeg button.on{border-color:rgb(var(--glow));color:var(--vellum);
  background:rgba(var(--glow),.12);box-shadow:0 0 16px rgba(var(--glow),.25)}
#app[data-lang="en"] #diffSeg button{font-family:'EB Garamond',serif;letter-spacing:.08em}
.diffDesc{margin-top:10px;font-size:12.5px;color:var(--vellum-dk);letter-spacing:.04em;min-height:1.4em}

/* ── language toggle & EN typography ── */
#langSeg{display:flex;gap:0;border:1px solid rgba(230,214,171,.35);border-radius:4px;overflow:hidden;flex:none}
#langSeg button{font-family:'Song Myung',serif;font-size:11px;letter-spacing:.04em;padding:4px 10px;
  background:transparent;border:none;color:var(--vellum-dk);cursor:pointer;transition:all .2s}
#langSeg button.on{background:rgba(var(--glow),.2);color:var(--vellum)}
#actChip{text-align:center;margin-top:7px}
#app[data-lang="en"] :is(#gameTitle,#dayLine,#actChip,.charName,.overlay h1,.overlay .kicker,.overlay .days,.btn,.opt .num,#actOv .actNum,.colCell .cName,.delta){font-family:'EB Garamond',serif}
#app[data-lang="en"] :is(.cardText,.overlay .body,.opt,.roleTag,#gRes p,.seal .lbl,.colBtn,.overlay .hint){font-family:'EB Garamond',serif}
#app[data-lang="en"] #gameTitle{letter-spacing:.16em;font-size:11px}
#app[data-lang="en"] .overlay h1{letter-spacing:.05em}
#app[data-lang="en"] #dayLine{letter-spacing:.05em}
#app[data-lang="en"] .charName{letter-spacing:.06em;text-indent:.06em}
#app[data-lang="en"] .roleTag{letter-spacing:.24em;text-indent:.24em}
#app[data-lang="en"] .btn{letter-spacing:.14em;text-indent:.14em}
#app[data-lang="en"] .overlay .kicker{letter-spacing:.32em;text-indent:.32em}
#app[data-lang="en"] .cardText{font-size:16px;line-height:1.6}
#app[data-lang="en"] .opt{font-size:15px}

/* ── overlays ── */
.overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;background:
  radial-gradient(100% 70% at 50% 110%, rgba(var(--glow),.12), transparent 55%), rgba(5,4,3,.95);
  opacity:0;pointer-events:none;transition:opacity .6s}
.overlay.show{opacity:1;pointer-events:auto}
.overlay .kicker{font-size:13px;letter-spacing:.5em;text-indent:.5em;color:var(--vellum-dk)}
.overlay h1{font-family:'Song Myung',serif;font-size:42px;letter-spacing:.16em;margin:18px 0 8px;line-height:1.35;
  color:var(--vellum);text-shadow:0 0 26px rgba(var(--glow),.45)}
.overlay .body{font-size:16px;line-height:1.95;color:#d4c194;max-width:310px;word-break:keep-all;margin-top:10px}
.overlay .hint{font-size:13px;color:var(--vellum-dk);margin-top:20px;letter-spacing:.06em}
.overlay .days{font-family:'Song Myung',serif;margin-top:26px;font-size:15px;letter-spacing:.22em;color:rgb(var(--glow))}
.btn{margin-top:32px;font-family:'Song Myung',serif;font-size:16px;letter-spacing:.28em;text-indent:.28em;color:var(--vellum);
  background:rgba(var(--glow),.06);border:1px solid rgba(230,214,171,.45);padding:15px 36px;border-radius:3px;cursor:pointer;
  transition:all .25s;text-shadow:0 0 12px rgba(var(--glow),.45)}
.btn:hover,.btn:focus-visible{background:rgba(var(--glow),.15);border-color:rgb(var(--glow));outline:none;
  box-shadow:0 0 26px rgba(var(--glow),.3)}
#ending.death h1{color:#d3705a;text-shadow:0 0 26px rgba(160,58,43,.6)}

/* act interstitial */
#actOv{cursor:pointer}
#actOv .actNum{font-family:'Song Myung',serif;font-size:15px;letter-spacing:.6em;text-indent:.6em;color:rgb(var(--glow));
  text-shadow:0 0 14px rgba(var(--glow),.6)}
#actOv h1{font-size:52px}
#actOv .body{font-style:normal}
#actOv .hint{animation:hintPulse 2.4s ease-in-out infinite}
@keyframes hintPulse{50%{opacity:.4}}

@media (max-height:730px){
  .cardText{font-size:15px;padding-bottom:13px}
  .opt{padding:11px 13px;font-size:14.5px}
  .seal .orb{width:46px;height:46px}
  .overlay h1{font-size:34px}
  #actOv h1{font-size:42px}
}
@media (prefers-reduced-motion:reduce){

{id:'a1_bell',act:1,char:'priest',name:{ko:'사제 오스문드',en:'Father Osmund'},role:{ko:'교회',en:'The Church'},

 text:{ko:'"공중목욕탕을 닫으라는 명이 돌던데, 정말인가요? 사람 모이는 게 무섭긴 한데, 씻지도 못하면 그건 그거대로 병이 돌 텐데요."',

{id:'a2_rope',act:2,char:'merchant',name:{ko:'곡물 상인 발도',en:'Baldo the Grain Merchant'},role:{ko:'성벽 아래',en:'Beneath the Walls'},

{id:'a2_widow',act:2,char:'refugee',name:{ko:'과부 한나',en:'Hanna the Widow'},role:{ko:'문 앞',en:'At the Door'},
 text:{ko:'"남편이 어젯밤 숨을 거뒀어요. 한데 격리 표식이 붙으면 저희 애들은 굶어요. 아무도 삯일을 안 줄 테니까요. 나리, 하루만... 하루만 늦게 붙여주세요."',
 en:'"My husband died in the night. But the moment that mark goes on our door, my children starve — no one hires from a marked house. One day, my lord... just one day\'s grace."'},

{id:'a2_bells',act:2,char:'priest',name:{ko:'사제 오스문드',en:'Father Osmund'},role:{ko:'애도의 종',en:'The Mourning Bell'},
 text:{ko:'"사람이 죽을 때마다 종을 울리다 보니, 이제 도시가 하루 종일 웁니다. 종소리에 산 사람들 얼굴이 다 잿빛입니다."',

{id:'a2_orphans',act:2,char:'child',name:{ko:'남겨진 아이들',en:'The Children Left Behind'},role:{ko:'고아',en:'Orphans'},

{id:'a2_stranger',act:2,char:'thief',name:{ko:'떠돌이 의원',en:'The Wandering Doctor'},role:{ko:'뜨내기',en:'The Drifter'},

{id:'b_steward',beat:23,act:3,char:'thief',name:{ko:'곳간의 배신',en:'Betrayal at the Granary'},role:{ko:'제3막',en:'Act Three'},

 text:{ko:'"오늘 새벽엔 빨랫감이 줄었어요. 병자 옷이 줄었다는 뜻이에요. 나리... 이거, 좋은 징조 맞죠?"',

 en:'"Have you heard of the old lord\'s sealed cellar? Could be grain sleeping down there... could be nothing but rubble."'},
 opts:[
  {lbl:{ko:'봉인을 연다',en:'Break the seal'},gamble:{p:0.5,
   win:{fx:{f:14},txt:{ko:'봉인 뒤에는 곡식 자루가 잠들어 있었다. 옛 영주의 마지막 선물이었다.',en:'Behind the seal, sacks of grain lay sleeping. A last gift from the old lord.'}},
   lose:{fx:{t:-6,m:-4},txt:{ko:'돌무더기뿐이었다. 헛수고에 지친 사람들의 눈초리가 따가웠다.',en:'Rubble, nothing more. Weary, resentful eyes followed you home.'}}}},
  {lbl:{ko:'헛소문에 쓸 인력이 없다',en:'We have no hands to waste on rumors'},fx:{m:-2}}
 ]},

{id:'a3_fire',act:3,char:'guard',name:{ko:'경비대장 로릭',en:'Captain Rorik'},role:{ko:'빈집 화재',en:'Fire in the Empty Quarter'},
 text:{ko:'"빈집에서 불이 났습니다. 사는 이가 없어 그냥 두면 골목째 옮겨붙을 겁니다. 헐어서 불길을 끊는 수밖에요."',
 en:'"A fire in the empty houses. No one lives there to fight it — left alone, it takes the whole lane. We tear down houses and cut its path, or nothing."'},
 opts:[
  {lbl:{ko:'이웃집까지 헐어 길을 끊는다',en:'Tear down to the neighbors\' walls'},fx:{h:7,m:-6}},
  {lbl:{ko:'총력으로 물을 붓는다',en:'Fight it with everything we have'},fx:{h:3,m:-4}},
  {lbl:{ko:'그 골목은 태워서 소독한다',en:'Let it burn the lane clean'},fx:{h:8,m:-9}}
 ]},

{id:'a3_prophet',act:3,char:'priest',name:{ko:'광장의 광인',en:'The Madman in the Square'},role:{ko:'예언',en:'Prophecy'},
 text:{ko:'한 사내가 광장에서 외치고 있다. "엿새 뒤 모두 죽는다! 성문을 부수고 나가야 산다!" 몇몇이 걸음을 멈추고 듣기 시작했다.',
 en:'A man stands shouting in the square: "In six days we all die! Break the gates and run!" A few have stopped to listen.'},

  {lbl:{ko:'사제를 보내 조목조목 반박한다',en:'Send the priest to refute him, point by point'},fx:{m:6,t:-2}},
  {lbl:{ko:'헛소리는 곧 지친다',en:'Raving tires itself out'},fx:{m:-6}}
 ]},

{id:'a3_ledger',act:3,char:'thief',name:{ko:'장부 담당 서기',en:'The Clerk of Records'},role:{ko:'은밀한 제안',en:'A Quiet Offer'},
 text:{ko:'"사망자 숫자를... 조금만 줄여 적으면 영주의 화를 피할 수 있습니다. 들키지만 않으면요." 서기가 목소리를 낮춘다.',
 en:'"If we... trimmed the death count, just a little, the lord\'s anger might pass us by. So long as no one finds out." The clerk lowers his voice.'},
 opts:[
  {lbl:{ko:'숫자를 줄인다',en:'Trim the numbers'},gamble:{p:0.6,
   win:{fx:{t:8},txt:{ko:'영주는 줄어든 숫자에 흡족해했다. 아무도 다시 세어 보지 않았다.',en:'The lord was pleased with the smaller count. No one ever counted again.'}},
   lose:{fx:{t:-10,m:-5},txt:{ko:'밀정이 진짜 장부를 먼저 올려 보냈다. 그대의 이름 옆에 "거짓"이라 적혀 있었다.',en:'The spy sent the true ledger first. Beside your name, a single word: "liar."'}}}},
  {lbl:{ko:'있는 그대로 적는다',en:'Write it as it is'},fx:{t:-5,m:3}}
 ]},

{id:'a3_well',act:3,char:'mabel',name:{ko:'세탁부 메이블',en:'Mabel the Washerwoman'},role:{ko:'마지막 우물',en:'The Last Well'},
 text:{ko:'"성한 우물이 이제 하나뿐이에요. 새벽부터 줄이 늘어서고, 어제는 물통 앞에서 주먹다짐까지 났어요."',
 en:'"Only one clean well left. The line starts before dawn — yesterday it came to blows over a bucket."'},
 opts:[
  {lbl:{ko:'물 배급제를 시행한다',en:'Ration the water'},fx:{h:6,m:-5}},
  {lbl:{ko:'경비병을 세워 질서만 잡는다',en:'Post a guard to keep order'},fx:{h:3,m:-1,t:-2}},
  {lbl:{ko:'알아서들 하게 둔다',en:'Let them sort it out'},fx:{m:3,h:-6}}
 ]},

{id:'c_rats',crisis:true,minAct:2,cond:s=>s.h<=30,char:'rats',name:{ko:'대낮의 쥐떼',en:'Rats at Noon'},role:{ko:'흉조',en:'An Ill Omen'},
 text:{ko:'대낮의 광장을 쥐떼가 가로질렀다. 아무도 비명을 지르지 않았다. 그 침묵이 비명보다 무거웠다.',
 en:'A river of rats crossed the square in broad daylight. No one screamed. The silence was heavier than any scream.'},

  {lbl:{ko:'쥐잡이꾼을 총동원한다',en:'Turn out every rat-catcher'},fx:{h:8,f:-7}},
  {lbl:{ko:'기도밖에 할 것이 없다',en:'There is nothing left but prayer'},fx:{m:3,h:-7}}
 ]},

{id:'c_crowd',crisis:true,minAct:2,cond:s=>s.m<=30,char:'refugee',name:{ko:'광장의 함성',en:'The Roar in the Square'},role:{ko:'분노',en:'Fury'},
 text:{ko:'광장에 사람들이 모였다. "문을 열어라!" 함성이 성벽을 두드린다. 횃불 몇 개가 어둠 속에서 흔들린다.',
 en:'A crowd has gathered. "Open the gates!" The chant beats against the walls. A few torches sway in the dark.'},
 opts:[
  {lbl:{ko:'홀로 광장에 나선다',en:'Walk out to them alone'},fx:{m:11,t:-6}},
  {lbl:{ko:'경비대로 해산시킨다',en:'Disperse them with the guard'},fx:{m:-8,t:8}},
  {lbl:{ko:'그 자리에서 빵을 푼다',en:'Hand out bread on the spot'},fx:{m:8,f:-9}}
 ]},

{id:'c_mutiny',crisis:true,minAct:2,cond:s=>s.t<=30,char:'guard',name:{ko:'창끝의 방향',en:'Where the Spears Point'},role:{ko:'경고',en:'A Warning'},
 text:{ko:'"병사들이 밀린 급료 대신 곳간 열쇠를 요구합니다. 이건... 요구가 아니라 통보에 가깝습니다. 대장으로서 마지막으로 말리는 중입니다."',
 en:'"The men demand the granary keys in place of their back pay. This is... less a demand than a notice. As their captain, I am the last thing holding them back."'},
 opts:[
  {lbl:{ko:'열쇠 대신 급료를 푼다',en:'Open the pay chest instead'},fx:{f:-10,t:12}},
  {lbl:{ko:'주모자를 색출해 목을 벤다',en:'Find the ringleaders and behead them'},fx:{t:-7,m:-4}},
  {lbl:{ko:'열쇠를 내어 준다',en:'Hand over the keys'},fx:{f:-13,t:8,m:-5}}
 ]},

{id:'c_thief',crisis:true,minAct:1,cond:s=>s.f>=65,char:'thief',name:{ko:'곳간의 그림자',en:'A Shadow at the Granary'},role:{ko:'유혹',en:'Temptation'},
 text:{ko:'곳간이 가득하다는 소문이 돌자 밤손님이 들었다. 붙잡고 보니 아이 셋 딸린 어미였다. 광장의 모두가 처분을 지켜보고 있다.',
 en:'Word of the full granary drew a thief in the night. Caught — a mother of three. The whole square is watching what you will do.'},
 opts:[
  {lbl:{ko:'본보기로 처벌한다',en:'Punish her as an example'},fx:{m:-12,t:8,f:4}},
  {lbl:{ko:'곳간 일을 시켜 갚게 한다',en:'Have her work off the debt'},fx:{m:5,t:3,f:-3}},
  {lbl:{ko:'자루째 들려 보낸다',en:'Send her home with the sack'},fx:{m:9,f:-8,t:-5}}
 ]},

{id:'c_pride',crisis:true,minAct:1,cond:s=>s.m>=65,char:'refugee',name:{ko:'무거워진 사랑',en:'A Love Grown Heavy'},role:{ko:'과잉 기대',en:'Great Expectations'},
 text:{ko:'칭송이 높아지자 요구도 높아졌다. 성문을 열어 달라, 배급을 늘려 달라, 세금을 없애 달라. 광장의 목소리에 이제 거절이란 답은 없어 보인다.',
 en:'As the praise grew, so did the demands. Open the gates. Double the rations. End the taxes. The square no longer seems to accept "no" for an answer.'},
 opts:[
  {lbl:{ko:'단호하게 선을 긋는다',en:'Draw the line, firmly'},fx:{m:-14,t:6}},
  {lbl:{ko:'들어줄 것만 골라 들어준다',en:'Grant only what can be granted'},fx:{m:-8,f:-6}},
  {lbl:{ko:'모두 들어준다',en:'Grant it all'},fx:{m:3,f:-11,t:-7}}
 ]},

{id:'c_zeal',crisis:true,minAct:1,cond:s=>s.h>=65,char:'priest',name:{ko:'단속의 그늘',en:'The Shadow of Zeal'},role:{ko:'과잉 통제',en:'Overreach'},
 text:{ko:'"위생 단속반이 도를 넘었습니다. 멀쩡한 집에 격리 표식을 붙여 놓고, 떼 주는 값으로 뒷돈을 받는답니다. 나리의 이름을 팔면서요."',
 en:'"The sanitation wardens have gone too far. They mark healthy houses — then take bribes to remove the mark. In your name, my lord."'},
 opts:[
  {lbl:{ko:'단속반을 해체한다',en:'Disband the wardens'},fx:{h:-14,m:7}},
  {lbl:{ko:'주동자만 벌하고 규모를 줄인다',en:'Punish the ringleaders, scale it back'},fx:{h:-8,m:3,t:3}},
  {lbl:{ko:'단속엔 원성이 따르는 법이다',en:'Enforcement always breeds resentment'},fx:{h:3,m:-10}}
 ]},

{id:'c_shadow',crisis:true,minAct:1,cond:s=>s.t>=65,char:'envoy',name:{ko:'커진 그림자',en:'The Growing Shadow'},role:{ko:'월권',en:'Abuse of Power'},
 text:{ko:'"경비대가 나리의 위세를 업고 상인들 물건에 손을 대기 시작했습니다. 그리고... 영주의 밀정이 그걸 전부 적어 두고 있더군요."',
 en:'"The guard has begun helping itself to the merchants\' goods — trading on your authority. And... the lord\'s spy is writing all of it down."'},
 opts:[
  {lbl:{ko:'경비대의 권한을 회수한다',en:'Strip the guard\'s privileges'},fx:{t:-13,m:5}},
  {lbl:{ko:'조용히 주의만 준다',en:'A quiet word of warning'},fx:{t:-6}},
  {lbl:{ko:'그 정도는 눈감아 준다',en:'Let that much slide'},fx:{t:4,m:-9}}
 ]}
];

const COL_ORDER=['win','winFood','winPeople','winClean','winIron','winAshes','winCure','f0','f1','m0','m1','h0','h1','t0','t1'];

/* ══════════ 저장소 (가능하면 기기 저장, 안 되면 세션 유지) ══════════ */
const store={
  get(k){try{return window.localStorage.getItem(k);}catch(e){return (this._m&&this._m[k])||null;}},
  set(k,v){try{window.localStorage.setItem(k,v);}catch(e){(this._m=this._m||{})[k]=v;}}
};
let unlocked=new Set((store.get('sgdn_endings')||'').split(',').filter(Boolean));
function unlock(key){
  unlocked.add(key);
  store.set('sgdn_endings',[...unlocked].join(','));
  updateColBtn();
}
function updateColBtn(){
  document.getElementById('colBtn').textContent=UI.colBtn[LANG](unlocked.size);
}
function renderCollection(){
  const g=document.getElementById('colGrid');
  g.innerHTML='';
  COL_ORDER.forEach(k=>{
    const has=unlocked.has(k);
    const cell=document.createElement('div');
    cell.className='colCell'+(has?'':' locked');
    cell.innerHTML=has
      ?`<div class="thumb">${ENDSCENES[k]}</div><div class="cName">${T(ENDINGS[k].t)}</div>`
      :`<div class="thumb">?</div><div class="cName">???</div>`;
    g.appendChild(cell);
  });
}

 {ko:'지하실 창에 검은 천이 드리워졌다. 새벽까지 꺼지지 않는 등불을, 이웃들이 수군거렸다.',en:'Black cloth went over the cellar window. The neighbors began to whisper about the lamp that never went out.'},
 {ko:'사제는 사흘을 침묵한 끝에 고개를 끄덕였다. "신께서 보고 계십니다."',en:'The priest was silent for three days, then nodded. "God is watching."'},
 {ko:'에드윈은 말없이 물러났다. 답을 찾을 다른 길은 없었다.',en:'Edwin withdrew without a word. There was no other road to an answer.'}],
b_cure:[
 {ko:'곳간 절반이 약탕으로 들어갔다. 도시 곳곳에서 열이 꺾이기 시작했다.',en:'Half the granary went into the kettles. Across the city, fevers began to break.'},
 {ko:'가장 위중한 병상부터 약이 돌았다. 나머지는 기다렸다.',en:'The medicine went to the gravest beds first. The rest waited.'},
 {ko:'에드윈은 약병을 내려놓았다. "그럼 셋만으로 끝이겠군요."',en:'Edwin set the vial down. "Then three is where it ends."'}],
b_trial:[
 {ko:'그대가 재판정 문 앞에 섰다. 교회도 그 앞에서는 멈췄다.',en:'You stood before the courtroom door. Even the Church stopped there.'},
 {ko:'재판정에서 에드윈은 고개를 들지 않았다. 도시는 의사를 잃었다.',en:'At trial, Edwin never raised his head. The city lost its physician.'},
 {ko:'새벽 수레에 실려 에드윈이 도시를 떠났다. 연구 노트만 남았다.',en:'A dawn cart carried Edwin away. Only his notes remained.'}],
b_granary:[
 {ko:'배급 줄의 그릇이 절반만 채워졌다. 원망은 그릇보다 가득했다.',en:'The ration bowls came back half-full. The resentment came back overflowing.'},
 {ko:'곳간지기는 장부를 덮으며 한숨을 쉬었다. "보름입니다, 나리."',en:'The keeper closed his ledger with a sigh. "Fifteen days, my lord."'},
 {ko:'귀족들의 창고가 열렸다. 광장은 환호했고, 저택들은 이를 갈았다.',en:'The nobles\' stores were opened. The square cheered; the manors ground their teeth.'}],
a2_nurse:[
 {ko:'쇠고랑 대신 앞치마를 두른 죄수들이 병상 사이를 오갔다.',en:'Prisoners traded their chains for aprons and moved between the beds.'},
 {ko:'수녀들이 도착했다. 병상 곁에 다시 사람의 손이 닿았다.',en:'The sisters arrived. Human hands returned to the bedsides.'},
 {ko:'닫힌 문 너머의 기침 소리가 골목의 전부가 되었다.',en:'Coughing behind closed doors became the whole sound of the lanes.'}],
a2_sick:[
 {ko:'두 병사가 격리 막사로 옮겨졌다. 동료들의 눈빛이 복잡했다.',en:'The two men were moved to quarantine. Their comrades\' eyes were hard to read.'},
 {ko:'열이 오른 채로 두 병사가 초소에 섰다. 창이 흔들렸다.',en:'Fevered, the two stood their post. Their spears wavered.'},
 {ko:'두 병사는 급료 주머니를 쥔 채 잠들었다. 초소는 좁아졌지만 버텼다.',en:'They slept with their pay in hand. The watch ran thin, but it held.'}],
a2_rites:[
 {ko:'어떤 이는 기도 없이 떠났다. 남은 가족의 눈이 교회를 향했다.',en:'Some passed without a prayer. The eyes of the living turned toward the church.'},
 {ko:'사제들은 병상을 지켰다. 그리고 하나둘, 사제의 병상이 생겼다.',en:'The priests kept their vigils. And one by one, beds were made for priests.'},
 {ko:'창 너머로 기도문이 흘러들었다. 유리 한 장이 많은 것을 갈랐다.',en:'Prayers drifted in through the windows. A pane of glass divided a great deal.'}],
a2_quack:[
 {ko:'기둥에 묶인 약장수 앞에 빈 약병이 쌓였다.',en:'The empty bottles piled up at the feet of the bound apothecary.'},
 {ko:'은화가 주인들에게 돌아갔다. 믿음은 돌아가지 못했다.',en:'The silver went back to its owners. The faith did not.'},
 {ko:'가짜 약은 계속 팔렸다. 진짜 절망에게.',en:'The false cure kept selling — to real despair.'}],
a2_rope:[
 {ko:'밤마다 광주리가 오르내렸다. 값은 올라가기만 했다.',en:'The baskets rose and fell each night. The prices only rose.'},
 {ko:'관인이 찍힌 광주리만 성벽을 올랐다. 뒷골목의 원성도 올랐다.',en:'Only city-stamped baskets climbed the wall. So did the grumbling in the back streets.'},
 {ko:'끊긴 밧줄들이 바람에 흔들렸다. 성벽 밖 상인들은 짐을 쌌다.',en:'The cut ropes swayed in the wind. The merchants outside packed up.'}],
a2_digger:[
 {ko:'병사들이 삽을 들었다. 창을 들 때보다 말이 없었다.',en:'The soldiers took up shovels — quieter than they ever were with spears.'},
 {ko:'품삯 방이 붙자 삽을 든 줄이 생겼다. 배고픔이 두려움을 이겼다.',en:'Wages were posted, and a line of shovels formed. Hunger beat fear.'},
 {ko:'미뤄진 것들은 사라지지 않았다. 냄새가 먼저 알려 왔다.',en:'What was put off did not go away. The smell announced it first.'}],
a2_report:[
 {ko:'진짜 숫자가 영주의 책상에 올랐다. 답신은 없었지만, 숫자를 숨기지 않았다는 말은 골목에 남았다.',en:'The true count reached the lord\'s desk. No reply came — but the lanes remembered that the numbers were not hidden.'},
 {ko:'절반의 숫자가 떠났다. 나머지 절반은 그대의 몫으로 남았다.',en:'Half the number rode off. The other half stayed behind — yours to carry.'},
 {ko:'전령은 빈손으로 돌아갔다. 영주의 인내에도 바닥이 있다.',en:'The envoy went back empty-handed. Even a lord\'s patience has a floor.'}],
a2_oven:[
 {ko:'밤새 화덕이 붉었다. 빵 냄새가 두려움을 조금 덮었다.',en:'The ovens glowed all night. The smell of bread covered a little of the fear.'},
 {ko:'바트는 어깨를 늘어뜨렸다. "믿을 게 필요했을 뿐인데."',en:'Bart\'s shoulders fell. "Folk just needed something to believe."'},
 {ko:'연기는 하늘로, 믿음은 골목으로 퍼졌다.',en:'The smoke spread to the sky, the belief through the lanes.'}],
a2_stream:[
 {ko:'병자 옷은 아래쪽 물로 밀려났다. 강은 불평하지 않았다.',en:'The sick-wash moved downstream. The river did not complain.'},
 {ko:'빨래터마다 솥이 걸렸다. 김 사이로 메이블이 고개를 끄덕였다.',en:'Kettles went up at every washing stone. Through the steam, Mabel nodded.'},
 {ko:'강은 계속 하나였다. 병도 그랬다.',en:'The stream stayed one stream. So did the sickness.'}],
a2_flee:[
 {ko:'성벽의 횃불이 늘었다. 밧줄은 줄었다 — 보이는 곳에서는.',en:'More torches on the wall. Fewer ropes — where they could be seen.'},
 {ko:'밤마다 그림자 몇이 성벽을 넘었다. 떠난 수만큼, 배급 줄은 짧아졌다.',en:'Each night, a few shadows went over the wall. For every one who left, the ration line grew shorter.'},
 {ko:'광장 기둥에 도망자들이 묶였다. 떠나려던 발걸음들이 멈칫했다.',en:'Runaways were bound at the pillar. Feet that meant to leave hesitated.'}],
a2_widow:[
 {ko:'붉은 표식 아래로 배급 자루가 놓였다. 아이들은 굶지 않았다.',en:'Below the red mark, a ration sack was set down. The children did not starve.'},
 {ko:'하루 동안 한나는 삯일 세 개를 얻었다. 그 하루가 무엇을 옮겼는지는 모른다.',en:'In one day, Hanna found three jobs. What that day carried with it, no one knows.'},
 {ko:'문에 표식이 그려졌다. 규칙은 지켜졌고, 골목은 그것을 기억했다.',en:'The mark went up. The rules were kept — and the lane remembered it.'}],
a2_raid:[null,
 {ko:'지원자 여섯이 강을 건넜다. 넷이 곡식을 지고 돌아왔다.',en:'Six volunteers crossed the river. Four came back carrying grain.'},
 {ko:'강 건너 마을은 그대로 버려져 있었다. 곳간의 셈만 빠듯해졌다.',en:'The village stayed abandoned across the river. The granary\'s arithmetic grew tighter.'}],
a2_bells:[
 {ko:'종탑이 침묵했다. 도시는 죽음을 세는 법을 잊기로 했다.',en:'The bell tower fell silent. The city chose to stop counting its dead.'},
 {ko:'정오의 종이 길게 울렸다. 도시가 잠시 멈춰 고개를 숙였다.',en:'The noon bell rang long. The city paused, and bowed its head.'},
 {ko:'종은 계속 울렸다. 사람들은 종소리를 세지 않게 되었다.',en:'The bell went on tolling. People stopped counting the tolls.'}],
a2_orphans:[
 {ko:'수도원 마당에 아이들 빨래가 널렸다. 작은 것들이 바람에 흔들렸다.',en:'Children\'s laundry lined the convent yard — small things swaying in the wind.'},
 {ko:'골목마다 심부름 아이들이 뛰었다. 주머니엔 동전이, 입엔 빵이.',en:'Errand-children ran the lanes — coins in their pockets, bread in their mouths.'},
 {ko:'아이들은 스스로 크는 법을 배웠다. 너무 빨리.',en:'The children learned to raise themselves. Too quickly.'}],
a2_stranger:[null,
 {ko:'떠돌이는 물을 긷고 붕대를 삶았다. 에드윈의 잔소리를 들으며.',en:'The drifter hauled water and boiled bandages — to the sound of Edwin\'s scolding.'},
 {ko:'떠돌이는 옥에 갇혔다. 에드윈은 사흘 동안 말을 걸지 않았다.',en:'The drifter went to the cells. Edwin didn\'t speak to you for three days.'}],
a2_curfew:[
 {ko:'해가 지면 거리가 비었다. 창문 안쪽의 불빛만 남았다.',en:'The streets emptied at sundown. Only the lights behind windows remained.'},
 {ko:'자정의 종과 함께 골목이 잠들었다. 초저녁의 숨통은 남겨 둔 채.',en:'The lanes went to sleep at the midnight bell — the early evening left to breathe.'},
 {ko:'밤은 사람들의 것으로 남았다. 병의 것이기도 했다.',en:'The night remained the people\'s. It was also the plague\'s.'}],
b_steward:[
 {ko:'새벽, 교수대에 밧줄이 걸렸다. 곳간 자물쇠는 다시 뜯기지 않았다.',en:'At dawn, a rope went up on the gallows. The granary lock was never broken again.'},
 {ko:'관리인은 조용히 사라졌다. 소문은 조용히 퍼졌다.',en:'The ration master vanished quietly. The rumor spread the same way.'},
 {ko:'"아이가 굶고 있었습니다." 그 말은 광장에도 닿았다.',en:'"My child was starving." The words reached the square as well.'}],
b_ultimatum:[
 {ko:'답신이 떠났다. 이제 열흘 안에 그 말을 사실로 만들어야 한다.',en:'The reply rode off. Now you have ten days to make it true.'},
 {ko:'광장은 그 답신을 낭독해 달라 했다. 영주의 서기는 이를 갈았다.',en:'The square asked to hear the reply read aloud. The lord\'s clerk ground his teeth.'},
 {ko:'며칠 뒤, 수레 몇 대가 도착했다. 병사들의 눈초리와 함께.',en:'Days later, a few carts arrived — with soldiers\' eyes attached.'}],
b_lastnight:[
 {ko:'막사의 병자들이 그대를 알아보았다. 몇몇은 웃어 보이기까지 했다.',en:'The sick in the camps knew your face. A few even managed to smile.'},
 {ko:'광장의 모닥불 곁에서 누군가 그대에게 자리를 내주었다.',en:'By the fire in the square, someone made room for you.'},
 {ko:'성벽 위의 병사들이 말없이 경례했다. 서른 밤의 무게로.',en:'On the wall, the soldiers saluted without a word — with the weight of thirty nights.'}],
a3_wake:[
 {ko:'광장에 촛불이 줄지어 켜졌다. 그날 밤, 사람들은 오랜만에 울었다.',en:'Candles lined the square. That night, the people wept for the first time in a long while.'},
 {ko:'죽은 자들의 이름은 장부에만 남았다.',en:'The names of the dead remained only in the ledger.'},
 {ko:'종이 서른 번 울렸다. 사람들은 저마다의 자리에서 고개를 숙였다.',en:'The bell tolled thirty times. People bowed their heads wherever they stood.'}],
a3_edwin:[
 {ko:'에드윈은 항의하다 잠들었다. 열두 시간을.',en:'Edwin protested — then slept twelve hours.'},
 {ko:'조수가 붙자 에드윈의 손이 다시 안정을 찾았다.',en:'With an assistant at his side, Edwin\'s hands steadied again.'},
 {ko:'에드윈은 고개를 끄덕이고 다시 병상으로 향했다. 걸음이 느렸다.',en:'Edwin nodded and turned back to the wards. His steps were slow.'}],
a3_wall:[
 {ko:'빵집 주인도, 대장장이도 창을 들었다. 서툴지만, 섰다.',en:'The baker took up a spear; so did the smith. Clumsy — but they stood.'},
 {ko:'남쪽 문이 벽돌로 메워졌다. 도시가 조금 더 작아졌다.',en:'The south gate was bricked shut. The city grew a little smaller.'},
 {ko:'두 개의 문에 불이 켜졌다. 나머지는 어둠에 맡겨졌다.',en:'Two gates kept their torches. The rest were left to the dark.'}],
a3_child:[
 {ko:'아이는 "곧"이라는 말을 주머니에 넣고 뛰어갔다.',en:'The child pocketed the word "soon" and ran off.'},
 {ko:'아이는 잠시 생각하더니 고개를 끄덕였다. "그럼 같이 버텨요."',en:'The child thought a moment, then nodded. "Then we\'ll hold on together."'},
 {ko:'아이는 그대의 침묵을 오래 바라보다 돌아갔다.',en:'The child studied your silence a long while, then turned away.'}],
a3_boat:[
 {ko:'발도는 처음으로 값을 부르지 않고 고개를 숙였다.',en:'For the first time, Baldo bowed without naming a price.'},
 {ko:'새벽 강 위로 배 한 척이 떠났다. 그 소문도 함께 떠다녔다.',en:'A boat slipped down the river at dawn. So did the rumor of it.'},
 {ko:'배는 사흘 뒤 약재 상자를 싣고 돌아왔다.',en:'Three days later, the boat returned with crates of medicine.'}],
a3_seed:[
 {ko:'갓 구운 빵 냄새가 골목을 채웠다. 내일은 내일에게 맡겼다.',en:'The smell of fresh bread filled the lanes. Tomorrow was left to tomorrow.'},
 {ko:'밀 포대에 \'봄\'이라고 적혔다. 배고픈 채로 적은 글자였다.',en:'On the sack, someone wrote "spring." Written on an empty stomach.'},
 {ko:'절반은 빵이 되고, 절반은 약속이 되었다.',en:'Half became bread; half became a promise.'}],
a3_grave:[
 {ko:'성 밖에 긴 구덩이가 파였다. 이름 대신 숫자가 세워졌다.',en:'A long pit was dug beyond the walls. Numbers stood where names should have.'},
 {ko:'강가에서 연기가 사흘을 올랐다. 사제는 끝까지 그 곁을 지켰다.',en:'Smoke rose by the river for three days. The priest never left its side.'},
 {ko:'교회 앞마당에 새 흙이 줄지어 덮였다. 오스문드는 말없이 축복했다.',en:'Fresh earth lined the churchyard. Osmund blessed it without a word.'}],
a3_dawn:[
 {ko:'메이블의 얼굴이 밝아졌다. 그 미소가 정오 무렵 빨래터를 한 바퀴 돌았다.',en:'Mabel\'s face lit up. By noon, the smile had made its way around the washing stones.'},
 {ko:'메이블은 입을 다물었다. 그래도 빨랫감은 계속 줄었다.',en:'Mabel said no more. The washing kept shrinking all the same.'},
 {ko:'메이블은 그 끄덕임을 들고 새벽 강가로 돌아갔다.',en:'Mabel took that nod back with her to the dawn river.'}],
a3_vault:[null,
 {ko:'봉인은 그대로 남았다. 소문도 그대로 남았다.',en:'The seal stayed shut. So did the rumor.'}],
a3_fire:[
 {ko:'집 세 채가 무너지고 불길이 멈췄다. 골목은 살았다.',en:'Three houses came down, and the fire stopped. The lane survived.'},
 {ko:'물동이가 밤새 오갔다. 새벽에야 잿더미 위로 김이 올랐다.',en:'Buckets passed hand to hand all night. By dawn, steam rose from the ashes.'},
 {ko:'골목 하나가 재가 되었다. 재 위로는 아무것도 옮지 않는다.',en:'One lane burned to ash. Nothing spreads across ash.'}],
a3_prophet:[
 {ko:'광인은 옥에서도 외쳤다. 엿새 뒤, 아무도 죽지 않았다.',en:'The madman shouted on from his cell. Six days later, no one died.'},
 {ko:'사제의 반박이 광장을 돌았다. 광인의 목소리가 처음으로 잦아들었다.',en:'The priest\'s rebuttal made the rounds. For the first time, the madman\'s voice faltered.'},
 {ko:'엿새가 지났다. 광인은 새 날짜를 외치기 시작했다.',en:'Six days passed. The madman began shouting a new date.'}],
a3_ledger:[null,
 {ko:'서기는 한숨을 쉬며 진짜 숫자를 적어 내려갔다.',en:'The clerk sighed, and wrote the numbers as they were.'}],
a3_well:[
 {ko:'물표가 배급되었다. 줄은 길었지만, 주먹은 내려갔다.',en:'Water tokens went out. The line stayed long — but the fists came down.'},
 {ko:'우물가에 창 하나가 세워졌다. 그것으로 충분했다.',en:'A single spear stood at the well. It was enough.'},
 {ko:'우물가의 소란은 매일 아침의 일과가 되었다.',en:'The commotion at the well became part of every morning.'}],
c_rats:[
 {ko:'골목 셋이 불탔다. 쥐도, 그리고 몇 가지 다른 것들도 사라졌다.',en:'Three alleys burned. The rats vanished — along with a few other things.'},
 {ko:'쥐잡이꾼들이 사방으로 흩어졌다. 자루가 밤마다 차올랐다.',en:'The rat-catchers scattered in every direction. The sacks filled night after night.'},
 {ko:'광장에 무릎 꿇은 이들이 늘었다. 쥐들은 개의치 않았다.',en:'More knees touched the ground in the square. The rats paid no mind.'}],
c_crowd:[
 {ko:'그대가 홀로 광장에 서자 함성이 잦아들었다. 누군가 횃불을 내렸다.',en:'You stood alone before them, and the roar died down. Someone lowered a torch.'},
 {ko:'창벽이 광장을 밀어냈다. 흩어진 것은 사람이지 분노가 아니었다.',en:'A wall of spears pushed the square back. It scattered the people — not the anger.'},
 {ko:'빵이 손에서 손으로 건네졌다. 함성은 웅성거림이 되었다.',en:'Bread passed from hand to hand. The roar softened to a murmur.'}],
c_mutiny:[

c_shadow:[

/* ══════════ 난이도 ══════════ */
const DIFFS={easy:{fx:0.85,pr:-1},normal:{fx:1,pr:0},hard:{fx:1.25,pr:1}};
let DIFF='normal';
function sfx(v){
  if(!v)return 0;
  const r=Math.round(Math.abs(v)*DIFFS[DIFF].fx);
  return Math.sign(v)*Math.max(1,r);
}

/* ══════════ 언어 ══════════ */
let LANG='ko';
const T=v=>(v&&typeof v==='object'&&!Array.isArray(v))?(v[LANG]!==undefined?v[LANG]:v.ko):v;

/* ══════════ 엔진 ══════════ */
const app=document.getElementById('app');
const stage=document.getElementById('stage');
const choicesEl=document.getElementById('choices');
const dayLine=document.getElementById('dayLine');
const actChip=document.getElementById('actChip');
const progFill=document.getElementById('progFill');
const seals={};document.querySelectorAll('.seal').forEach(el=>seals[el.dataset.k]=el);
const KEYS=['f','m','h','t'];
const NUM=['Ⅰ','Ⅱ','Ⅲ','Ⅳ'];
const KDAY=['첫째','둘째','셋째','넷째','다섯째','여섯째','일곱째','여덟째','아홉째','열째'];
const actOf=d=>d<=10?1:d<=22?2:3;
let S,day,act,flags,used,busy=false,started=false,cur=null;


function reset(){
  S={f:50,m:50,h:50,t:50};day=1;act=1;flags={};used=new Set();busy=false;cur=null;
  if(resTimer){clearTimeout(resTimer);resTimer=null;}resNext=null;
  document.getElementById('gRes').className='';
  clearDeltas();
  app.dataset.act='1';renderStats();
  showAct(1,()=>beginDay());
}
function renderStats(){
  KEYS.forEach(k=>{
    seals[k].querySelector('.liq').style.height=Math.max(0,Math.min(100,S[k]))+'%';
    const lbl=seals[k].querySelector('.lbl');
    lbl.childNodes[0].textContent=T(UI.stat[k]);
    lbl.querySelector('b').textContent=Math.max(0,Math.min(100,S[k]));
    seals[k].classList.toggle('warn',S[k]<=20||S[k]>=80);
  });
}
function renderDay(){
  dayLine.textContent=UI.dayName[LANG](day);
  actChip.textContent=UI.actChip[LANG](act,T(ACT_INFO[act].title));
  progFill.style.width=(day/30*100)+'%';
}
const deltaQ={f:[],m:[],h:[],t:[]},deltaBusy={f:false,m:false,h:false,t:false};
function showDelta(k,v,press){
  deltaQ[k].push({v,press});
  pumpDelta(k);
}
function pumpDelta(k){
  if(deltaBusy[k]||!deltaQ[k].length)return;
  deltaBusy[k]=true;
  const {v,press}=deltaQ[k].shift();
  const d=document.createElement('span');
  d.className='delta '+(v>0?'up':'down')+(press?' press':'');
  d.textContent=(v>0?'+':'')+v;
  seals[k].appendChild(d);
  setTimeout(()=>{d.remove();deltaBusy[k]=false;pumpDelta(k);},press?1150:950);
}
function clearDeltas(){
  KEYS.forEach(k=>{deltaQ[k].length=0;deltaBusy[k]=false;
    seals[k].querySelectorAll('.delta').forEach(d=>d.remove());});
}

function pickCard(){
  const beats=CARDS.filter(c=>c.beat===day);
  for(const b of beats){
    if(b.req&&!flags[b.req])continue;
    if(b.noreq&&flags[b.noreq])continue;
    return b;
  }
  const crisis=CARDS.filter(c=>c.crisis&&!used.has(c.id)&&act>=(c.minAct||1)&&c.cond(S));
  if(crisis.length)return crisis[Math.floor(Math.random()*crisis.length)];
  let pool=CARDS.filter(c=>!c.beat&&!c.crisis&&c.act===act&&!used.has(c.id));
  if(!pool.length)pool=CARDS.filter(c=>!c.beat&&!c.crisis&&!used.has(c.id));
  return pool[Math.floor(Math.random()*pool.length)];
}

function beginDay(){
  act=actOf(day);app.dataset.act=String(act);renderDay();
  if(day>1){
    const p=PRESSURE[act];let died=null;
    for(const k in p){
      let v=p[k];
      if(v<0)v=Math.min(0,v-DIFFS[DIFF].pr);
      if(k==='h'&&flags.cure)v=Math.min(0,v+2);
      if(!v)continue;
      S[k]+=v;showDelta(k,v,true);
      if(S[k]<=0)died=k;
    }
    renderStats();
    if(died)return ending(died+'0',true,true);
  }
  deal();
}

function deal(){
  cur=pickCard();used.add(cur.id);
  cur._order=null;
  renderCard();
  busy=false;
}
function renderCard(){
  if(!cur)return;
  const card=document.createElement('div');
  card.className='card deal';
  card.innerHTML=`
    <span class="corner tl">${CORNER}</span><span class="corner tr">${CORNER}</span>
    <span class="corner bl">${CORNER}</span><span class="corner br">${CORNER}</span>
    <div class="portrait">${portraitSVG(cur.char)}</div>
    <div class="roleTag">${T(cur.role)||''}</div>
    <div class="charName">${T(cur.name)}</div>
    <div class="nameOrn"><i></i></div>
    <div class="cardText">${T(cur.text)}</div>`;
  stage.innerHTML='';stage.appendChild(card);
  attachTilt(card);
  choicesEl.innerHTML='';
  if(!cur._order){
    cur._order=cur.opts.map((_,i)=>i);
    for(let j=cur._order.length-1;j>0;j--){
      const r=Math.floor(Math.random()*(j+1));
      [cur._order[j],cur._order[r]]=[cur._order[r],cur._order[j]];
    }
  }
  cur._order.forEach((oi,pos)=>{
    const o=cur.opts[oi];
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="num">${NUM[pos]}</span><span class="txt">${T(o.lbl)}</span>`;
    b.addEventListener('click',()=>choose(oi,b,stage.querySelector('.card')));
    choicesEl.appendChild(b);
  });
}

function attachTilt(card){
  const fig=card.querySelector('.figLy')||card.querySelector('.artImg');
  const mid=card.querySelector('.ly-mid'), back=card.querySelector('.ly-back');
  card.addEventListener('pointermove',e=>{
    const r=card.getBoundingClientRect();
    const nx=((e.clientX-r.left)/r.width-0.5)*2;
    const ny=((e.clientY-r.top)/r.height-0.5)*2;
    card.style.transform=`rotateY(${nx*4}deg) rotateX(${ny*-3}deg)`;
    if(fig)fig.style.transform=`translateX(${nx*7}px)`;
    if(mid)mid.style.transform=`translateX(${nx*3.5}px)`;
    if(back)back.style.transform=`translateX(${nx*-2.5}px)`;
  });
  card.addEventListener('pointerleave',()=>{
    card.style.transform='';
    [fig,mid,back].forEach(l=>{if(l)l.style.transform='';});
  });
}

let resTimer=null,resNext=null;
function choose(i,btn,card){
  if(busy)return;busy=true;
  const o=cur.opts[i];
  btn.classList.add('chosen');
  choicesEl.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  card.classList.add('out');
  let fx=o.fx||{},resTxt=null;
  if(o.gamble){
    const good=Math.random()<o.gamble.p;
    const r=good?o.gamble.win:o.gamble.lose;
    fx=r.fx;resTxt=T(r.txt);
  }else{
    const rr=(RESTEXT[cur.id]||[])[i];
    if(rr)resTxt=T(rr);
  }
  const gr=document.getElementById('gRes');
  setTimeout(()=>{
    if(resTxt){
      gr.querySelector('p').textContent=resTxt;
      gr.querySelector('.tapHint').textContent=T(UI.tapNext);
      gr.className='show';
    }
    if(o.flag)flags[o.flag]=true;
    for(const k of KEYS){
      if(fx[k]){
        const sv=sfx(fx[k]);
        S[k]+=sv;
        showDelta(k,sv);
        seals[k].classList.remove('pulse');void seals[k].offsetWidth;seals[k].classList.add('pulse');
      }
    }
    renderStats();
    resNext=()=>{
      resNext=null;if(resTimer){clearTimeout(resTimer);resTimer=null;}
      gr.className='';
      for(const k of KEYS){
        if(S[k]<=0)return ending(k+'0',true);
        if(S[k]>=100)return ending(k+'1',true);
      }
      day++;
      if(day>30)return ending(winKey(),false);
      const na=actOf(day);
      if(na!==act){showAct(na,()=>beginDay());}
      else beginDay();
    };
    if(!resTxt)resNext();
  },430);
}
document.getElementById('gRes').addEventListener('pointerdown',()=>{if(resNext)resNext();});

document.addEventListener('keydown',e=>{
  if(resNext&&['Enter',' ','1','2','3','4'].includes(e.key)){resNext();return;}
  if(!started||busy)return;
  const idx=['1','2','3','4'].indexOf(e.key);
  if(idx>=0){
    const btns=choicesEl.querySelectorAll('.opt');
    if(btns[idx]&&!btns[idx].disabled)btns[idx].click();
  }
});

/* ══════════ 오버레이 ══════════ */
const intro=document.getElementById('intro'),endOv=document.getElementById('ending'),actOv=document.getElementById('actOv');
let actCb=null;
function showAct(a,cb){
  act=a;app.dataset.act=String(a);
  document.getElementById('actNum').textContent=T(ACT_INFO[a].num);
  document.getElementById('actTitle').textContent=T(ACT_INFO[a].title);
  document.getElementById('actDesc').innerHTML=T(ACT_INFO[a].desc);
  actCb=cb;
  setTimeout(()=>actOv.classList.add('show'),200);
}
actOv.addEventListener('click',()=>{
  if(!actCb)return;
  actOv.classList.remove('show');
  const cb=actCb;actCb=null;
  setTimeout(cb,450);
});
let lastEnd=null;
function winKey(){
  if(flags.cure)return 'winCure';
  const e=[['f','winFood'],['m','winPeople'],['h','winClean'],['t','winIron']]
    .map(([k,w])=>[Math.max(0,Math.min(100,S[k])),w]).sort((a,b)=>b[0]-a[0]);
  if(e[0][0]<40)return 'winAshes';
  if(e[0][0]>=60&&e[0][0]-e[1][0]>=12)return e[0][1];
  return 'win';
}
function ending(key,death,byPressure){
  lastEnd={key,death,byPressure,act,day};
  renderEnding();
  unlock(key);
  setTimeout(()=>endOv.classList.add('show'),300);
}
function renderEnding(){
  if(!lastEnd)return;
  const {key,death,byPressure}=lastEnd;
  const e=ENDINGS[key];
  KEYS.forEach(k=>S[k]=Math.max(0,Math.min(100,S[k])));renderStats();
  endOv.classList.toggle('death',death);
  document.getElementById('endScene').innerHTML=ENDSCENES[key]||'';
  document.getElementById('endKicker').textContent=death?T(UI.endDeath):T(UI.endLive);
  document.getElementById('endTitle').textContent=T(e.t);
  const ec=document.getElementById('endCause');
  if(death&&UI.cause[key]){
    ec.className=key[0];
    ec.querySelector('span').textContent=T(UI.cause[key]);
  }else{
    ec.className='hide';
  }
  const bod=(e.b[lastEnd.act]||e.b[2]||e.b);
  document.getElementById('endBody').textContent=T(bod.ko?bod:e.b);
  document.getElementById('endDays').textContent=death?'':T(UI.survived);
}
/* ══════════ 언어 전환 ══════════ */
function applyLang(l){
  LANG=l;store.set('sgdn_lang',l);
  app.dataset.lang=l;
  document.querySelectorAll('#langSeg button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  document.getElementById('gameTitle').textContent=T(UI.title);
  const intro=document.getElementById('intro');
  intro.querySelector('.kicker').textContent=T(UI.introKicker);
  intro.querySelector('h1').innerHTML=T(UI.introTitle);
  intro.querySelector('.body').innerHTML=T(UI.introBody);
  intro.querySelector('.hint').textContent=T(UI.introHint);
  document.getElementById('startBtn').textContent=T(UI.start);
  document.getElementById('againBtn').textContent=T(UI.again);
  document.getElementById('colClose').textContent=T(UI.close);
  const colOv=document.getElementById('colOv');
  colOv.querySelector('.kicker').textContent=T(UI.colKicker);
  colOv.querySelector('h1').textContent=T(UI.colTitle);
  document.querySelector('#actOv .hint').textContent=T(UI.actTap);
  applyDiff(DIFF);
  updateColBtn();
  if(started){
    renderDay();renderStats();
    if(actCb)showActTexts();
    if(cur&&!busy&&!endOv.classList.contains('show'))renderCard();
    if(endOv.classList.contains('show'))renderEnding();
    if(colOv.classList.contains('show'))renderCollection();
  }else{
    renderStatsLabelsOnly();
  }
}
function showActTexts(){
  const a=act;
  document.getElementById('actNum').textContent=T(ACT_INFO[a].num);
  document.getElementById('actTitle').textContent=T(ACT_INFO[a].title);
  document.getElementById('actDesc').innerHTML=T(ACT_INFO[a].desc);
}
function renderStatsLabelsOnly(){
  KEYS.forEach(k=>{
    const lbl=seals[k].querySelector('.lbl');
    lbl.childNodes[0].textContent=T(UI.stat[k]);
  });
}
document.querySelectorAll('#langSeg button').forEach(b=>{
  b.addEventListener('click',()=>applyLang(b.dataset.l));
});
LANG=store.get('sgdn_lang')||'ko';

function applyDiff(d){
  DIFF=d;store.set('sgdn_diff',d);
  document.querySelectorAll('#diffSeg button').forEach(b=>{
    b.classList.toggle('on',b.dataset.d===d);
    b.textContent=T(UI.diffName[b.dataset.d]);
  });
  document.getElementById('diffDesc').textContent=T(UI.diffDesc[d]);
}
document.querySelectorAll('#diffSeg button').forEach(b=>{
  b.addEventListener('click',()=>applyDiff(b.dataset.d));
});
DIFF=store.get('sgdn_diff')||'normal';
if(!DIFFS[DIFF])DIFF='normal';

document.getElementById('colBtn').addEventListener('click',()=>{renderCollection();document.getElementById('colOv').classList.add('show');});
document.getElementById('colClose').addEventListener('click',()=>{document.getElementById('colOv').classList.remove('show');});
applyLang(LANG);
document.getElementById('startBtn').addEventListener('click',()=>{intro.classList.remove('show');started=true;reset();});
document.getElementById('againBtn').addEventListener('click',()=>{endOv.classList.remove('show');busy=false;reset();});
</script>

if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
